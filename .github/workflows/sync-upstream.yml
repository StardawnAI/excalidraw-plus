name: Sync Upstream

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/liujuntao123/smart-excalidraw-next.git || true
          git fetch upstream

      - name: Check for changes
        id: check
        run: |
          if git diff HEAD..upstream/main --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Attempt merge
        if: steps.check.outputs.has_changes == 'true'
        id: merge
        run: |
          git checkout -b sync/upstream-$(date +%Y%m%d)
          if git merge upstream/main --no-edit; then
            echo "status=clean" >> $GITHUB_OUTPUT
          else
            git merge --abort
            echo "status=conflicts" >> $GITHUB_OUTPUT
          fi

      - name: Push and create PR
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.status == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(git branch --show-current)
          git push origin $BRANCH
          gh pr create \
            --title "🔄 Sync upstream changes" \
            --body "Automated sync from upstream. Review for Chinese UI text." \
            --label "upstream-sync"

      - name: Create issue for conflicts
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.status == 'conflicts'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "⚠️ Upstream sync has conflicts" \
            --body "Manual merge required. Run: git fetch upstream && git merge upstream/main" \
            --label "upstream-sync"
